trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main

variables:
  dotnetVersion: '9.0.x'
  buildConfiguration: 'Release'
  vmImage: 'ubuntu-latest'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

stages:
  - stage: Build
    displayName: Build & Test
    jobs:
      - job: BuildAndTest
        displayName: Build, Test & Publish
        pool:
          vmImage: $(vmImage)
        services:
          postgres:
            image: postgres:16-alpine
            ports:
              - 5432:5432
            env:
              POSTGRES_USER: test
              POSTGRES_PASSWORD: test
              POSTGRES_DB: hrsaas_test
        steps:
          - task: UseDotNet@2
            displayName: Setup .NET $(dotnetVersion)
            inputs:
              packageType: sdk
              version: $(dotnetVersion)

          - task: DotNetCoreCLI@2
            displayName: Restore
            inputs:
              command: restore
              projects: 'HrSaas.sln'

          - task: DotNetCoreCLI@2
            displayName: Build
            inputs:
              command: build
              projects: 'HrSaas.sln'
              arguments: '--no-restore --configuration $(buildConfiguration)'

          - task: DotNetCoreCLI@2
            displayName: Test
            inputs:
              command: test
              projects: 'HrSaas.sln'
              arguments: '--no-build --configuration $(buildConfiguration) --collect "XPlat Code Coverage"'
              publishTestResults: true

          - task: PublishCodeCoverageResults@2
            displayName: Publish Code Coverage
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/**/coverage.cobertura.xml'

          - task: DotNetCoreCLI@2
            displayName: Publish API
            inputs:
              command: publish
              projects: 'src/Api/HrSaas.Api/HrSaas.Api.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api'
              zipAfterPublish: true

          - publish: $(Build.ArtifactStagingDirectory)/api
            displayName: Upload API Artifact
            artifact: hrsaas-api

          - publish: infra
            displayName: Upload Infra Artifact
            artifact: infra

      - job: FormatCheck
        displayName: Format Check
        pool:
          vmImage: $(vmImage)
        steps:
          - task: UseDotNet@2
            displayName: Setup .NET
            inputs:
              packageType: sdk
              version: $(dotnetVersion)

          - task: DotNetCoreCLI@2
            displayName: Format Verify
            inputs:
              command: custom
              custom: format
              arguments: 'HrSaas.sln --verify-no-changes --severity warn'

  - stage: DeployDev
    displayName: Deploy to Dev
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    variables:
      - group: hrsaas-dev
      - name: environmentName
        value: dev
      - name: azureResourceGroup
        value: rg-hrsaas-dev
    jobs:
      - deployment: DeployInfra
        displayName: Deploy Infrastructure
        pool:
          vmImage: $(vmImage)
        environment: hrsaas-dev
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Deploy Bicep
                  inputs:
                    azureSubscription: 'hrsaas-azure-connection'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment group create \
                        --resource-group $(azureResourceGroup) \
                        --template-file $(Pipeline.Workspace)/infra/main.bicep \
                        --parameters environmentName=$(environmentName) \
                                     postgresPassword=$(postgresPassword) \
                                     jwtSecretKey=$(jwtSecretKey) \
                        --output json > deployment-output.json

                      echo "##vso[task.setvariable variable=appServiceName;isOutput=true]$(jq -r '.properties.outputs.appServiceName.value' deployment-output.json)"
                    name: bicepDeploy

      - deployment: DeployApp
        displayName: Deploy Application
        dependsOn: DeployInfra
        pool:
          vmImage: $(vmImage)
        environment: hrsaas-dev
        variables:
          appServiceName: $[ dependencies.DeployInfra.outputs['DeployInfra.bicepDeploy.appServiceName'] ]
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  displayName: Deploy to App Service
                  inputs:
                    azureSubscription: 'hrsaas-azure-connection'
                    appType: webAppLinux
                    appName: $(appServiceName)
                    package: '$(Pipeline.Workspace)/hrsaas-api/*.zip'

                - bash: |
                    APP_URL="https://$(appServiceName).azurewebsites.net"
                    echo "Waiting for deployment to settle..."
                    sleep 30
                    for i in {1..5}; do
                      STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/health/live" || true)
                      if [ "$STATUS" = "200" ]; then
                        echo "Health check passed"
                        exit 0
                      fi
                      echo "Attempt $i: status=$STATUS, retrying in 15s..."
                      sleep 15
                    done
                    echo "Health check failed after 5 attempts"
                    exit 1
                  displayName: Health Check

  - stage: DeployStaging
    displayName: Deploy to Staging (Blue-Green)
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    variables:
      - group: hrsaas-staging
      - name: environmentName
        value: staging
      - name: azureResourceGroup
        value: rg-hrsaas-staging
    jobs:
      - deployment: DeployInfra
        displayName: Deploy Infrastructure
        pool:
          vmImage: $(vmImage)
        environment: hrsaas-staging
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Deploy Bicep
                  inputs:
                    azureSubscription: 'hrsaas-azure-connection'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment group create \
                        --resource-group $(azureResourceGroup) \
                        --template-file $(Pipeline.Workspace)/infra/main.bicep \
                        --parameters environmentName=$(environmentName) \
                                     postgresPassword=$(postgresPassword) \
                                     jwtSecretKey=$(jwtSecretKey) \
                        --output json > deployment-output.json

                      echo "##vso[task.setvariable variable=appServiceName;isOutput=true]$(jq -r '.properties.outputs.appServiceName.value' deployment-output.json)"
                    name: bicepDeploy

      - deployment: DeployToSlot
        displayName: Deploy to Staging Slot
        dependsOn: DeployInfra
        pool:
          vmImage: $(vmImage)
        environment: hrsaas-staging
        variables:
          appServiceName: $[ dependencies.DeployInfra.outputs['DeployInfra.bicepDeploy.appServiceName'] ]
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  displayName: Deploy to Staging Slot
                  inputs:
                    azureSubscription: 'hrsaas-azure-connection'
                    appType: webAppLinux
                    appName: $(appServiceName)
                    slotName: staging
                    package: '$(Pipeline.Workspace)/hrsaas-api/*.zip'

                - bash: |
                    SLOT_URL="https://$(appServiceName)-staging.azurewebsites.net"
                    echo "=== Smoke Testing Staging Slot ==="
                    echo "Target: $SLOT_URL"
                    sleep 45
                    for i in {1..10}; do
                      LIVE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$SLOT_URL/health/live" 2>/dev/null || echo "000")
                      READY=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$SLOT_URL/health/ready" 2>/dev/null || echo "000")
                      echo "Attempt $i/10: live=$LIVE ready=$READY"
                      if [ "$LIVE" = "200" ] && [ "$READY" = "200" ]; then
                        echo "=== Staging slot healthy ==="
                        exit 0
                      fi
                      sleep 15
                    done
                    echo "=== Staging slot FAILED health checks ==="
                    exit 1
                  displayName: Smoke Test Staging Slot

      - deployment: SwapSlots
        displayName: Swap Staging → Production (Zero Downtime)
        dependsOn: DeployToSlot
        pool:
          vmImage: $(vmImage)
        environment: hrsaas-staging
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureAppServiceManage@0
                  displayName: Swap Staging Slot to Production
                  inputs:
                    azureSubscription: 'hrsaas-azure-connection'
                    action: 'Swap Slots'
                    webAppName: $(appServiceName)
                    resourceGroupName: $(azureResourceGroup)
                    sourceSlot: staging

                - bash: |
                    APP_URL="https://$(appServiceName).azurewebsites.net"
                    echo "=== Post-Swap Verification ==="
                    sleep 10
                    for i in {1..5}; do
                      STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$APP_URL/health/live" || true)
                      echo "Post-swap check $i: status=$STATUS"
                      if [ "$STATUS" = "200" ]; then
                        echo "=== Production healthy after swap ==="
                        exit 0
                      fi
                      sleep 10
                    done
                    echo "WARNING: Post-swap health check inconclusive"
                    exit 1
                  displayName: Post-Swap Health Check

  - stage: DeployProd
    displayName: Deploy to Production (Blue-Green)
    dependsOn: DeployStaging
    condition: succeeded()
    variables:
      - group: hrsaas-prod
      - name: environmentName
        value: prod
      - name: azureResourceGroup
        value: rg-hrsaas-prod
    jobs:
      - deployment: DeployInfra
        displayName: Deploy Infrastructure
        pool:
          vmImage: $(vmImage)
        environment: hrsaas-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Deploy Bicep
                  inputs:
                    azureSubscription: 'hrsaas-azure-connection'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment group create \
                        --resource-group $(azureResourceGroup) \
                        --template-file $(Pipeline.Workspace)/infra/main.bicep \
                        --parameters environmentName=$(environmentName) \
                                     postgresPassword=$(postgresPassword) \
                                     jwtSecretKey=$(jwtSecretKey) \
                        --output json > deployment-output.json

                      echo "##vso[task.setvariable variable=appServiceName;isOutput=true]$(jq -r '.properties.outputs.appServiceName.value' deployment-output.json)"
                    name: bicepDeploy

      - deployment: DeployToSlot
        displayName: Deploy to Staging Slot
        dependsOn: DeployInfra
        pool:
          vmImage: $(vmImage)
        environment: hrsaas-prod
        variables:
          appServiceName: $[ dependencies.DeployInfra.outputs['DeployInfra.bicepDeploy.appServiceName'] ]
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  displayName: Deploy to Staging Slot
                  inputs:
                    azureSubscription: 'hrsaas-azure-connection'
                    appType: webAppLinux
                    appName: $(appServiceName)
                    slotName: staging
                    package: '$(Pipeline.Workspace)/hrsaas-api/*.zip'

                - bash: |
                    SLOT_URL="https://$(appServiceName)-staging.azurewebsites.net"
                    echo "=== Smoke Testing Production Staging Slot ==="
                    echo "Target: $SLOT_URL"
                    sleep 60
                    for i in {1..15}; do
                      LIVE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$SLOT_URL/health/live" 2>/dev/null || echo "000")
                      READY=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$SLOT_URL/health/ready" 2>/dev/null || echo "000")
                      echo "Attempt $i/15: live=$LIVE ready=$READY"
                      if [ "$LIVE" = "200" ] && [ "$READY" = "200" ]; then
                        echo "=== Production staging slot healthy ==="
                        exit 0
                      fi
                      sleep 15
                    done
                    echo "=== Production staging slot FAILED ==="
                    exit 1
                  displayName: Smoke Test Staging Slot

      - deployment: SwapSlots
        displayName: Swap to Production (Zero Downtime)
        dependsOn: DeployToSlot
        pool:
          vmImage: $(vmImage)
        environment: hrsaas-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureAppServiceManage@0
                  displayName: Swap Staging Slot to Production
                  inputs:
                    azureSubscription: 'hrsaas-azure-connection'
                    action: 'Swap Slots'
                    webAppName: $(appServiceName)
                    resourceGroupName: $(azureResourceGroup)
                    sourceSlot: staging

                - bash: |
                    APP_URL="https://$(appServiceName).azurewebsites.net"
                    echo "=== Production Post-Swap Verification ==="
                    sleep 15
                    PASS=false
                    for i in {1..5}; do
                      STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$APP_URL/health/live" || true)
                      echo "Post-swap check $i: status=$STATUS"
                      if [ "$STATUS" = "200" ]; then
                        PASS=true
                        echo "=== Production healthy ==="
                        break
                      fi
                      sleep 10
                    done
                    if [ "$PASS" = "false" ]; then
                      echo "=== ROLLBACK: Swapping back to previous version ==="
                      az webapp deployment slot swap \
                        -g $(azureResourceGroup) \
                        -n $(appServiceName) \
                        -s staging \
                        --target-slot production 2>/dev/null || true
                      echo "=== Rollback completed ==="
                      exit 1
                    fi
                  displayName: Post-Swap Health Check with Auto-Rollback
