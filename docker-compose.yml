services:
  postgres:
    image: postgres:16-alpine
    container_name: hrsaas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hrsaas
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: hrsaas-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hrsaas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: hrsaas-otel
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./infra/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"
      - "4318:4318"

  seq:
    image: datalust/seq:latest
    container_name: hrsaas-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: Y
    ports:
      - "5341:5341"
      - "8080:80"

  api:
    build:
      context: .
      dockerfile: src/Api/HrSaas.Api/Dockerfile
    container_name: hrsaas-api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=hrsaas;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      ConnectionStrings__RabbitMQ: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      ConnectionStrings__Redis: redis:6379
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__Issuer: HrSaas
      Jwt__Audience: hrsaas-api
      Telemetry__OtlpEndpoint: http://otel-collector:4317
      Serilog__WriteTo__1__Name: Seq
      Serilog__WriteTo__1__Args__serverUrl: http://seq:5341
      Azure__KeyVault__VaultUri: ${AZURE_KEYVAULT_VAULT_URI:-}
      Azure__BlobStorage__ConnectionString: ${AZURE_BLOB_CONNECTION_STRING:-}
      Azure__ApplicationInsights__ConnectionString: ${AZURE_APPINSIGHTS_CONNECTION_STRING:-}
      ConnectionStrings__AzureServiceBus: ${AZURE_SERVICEBUS_CONNECTION_STRING:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres-data:
  redis-data:
