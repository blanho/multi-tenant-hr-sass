name: CD — Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [dev, staging, prod]

env:
  DOTNET_VERSION: '9.0.x'
  AZURE_RESOURCE_GROUP_DEV: rg-hrsaas-dev
  AZURE_RESOURCE_GROUP_STAGING: rg-hrsaas-staging
  AZURE_RESOURCE_GROUP_PROD: rg-hrsaas-prod

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    outputs:
      artifact-name: hrsaas-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore HrSaas.sln

      - name: Build
        run: dotnet build HrSaas.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test HrSaas.sln --no-build --configuration Release

      - name: Publish
        run: >
          dotnet publish src/Api/HrSaas.Api/HrSaas.Api.csproj
          --configuration Release
          --output ./publish
          --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hrsaas-api
          path: ./publish

  deploy-infra:
    name: Deploy Infrastructure (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment || 'staging' }}
    outputs:
      app-service-name: ${{ steps.bicep.outputs.appServiceName }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        id: bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env[format('AZURE_RESOURCE_GROUP_{0}', github.event.inputs.environment || 'staging')] }}
          template: infra/main.bicep
          parameters: >
            environmentName=${{ github.event.inputs.environment || 'staging' }}
            postgresPassword=${{ secrets.POSTGRES_PASSWORD }}
            jwtSecretKey=${{ secrets.JWT_SECRET_KEY }}

  deploy-app:
    name: Deploy App Service
    runs-on: ubuntu-latest
    needs: [build, deploy-infra]
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: hrsaas-api
          path: ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.deploy-infra.outputs.app-service-name }}
          package: ./publish

      - name: Health check
        run: |
          APP_URL="https://${{ needs.deploy-infra.outputs.app-service-name }}.azurewebsites.net"
          echo "Waiting for deployment to settle..."
          sleep 30
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/health/live" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 15s..."
            sleep 15
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1
